# Note: Requires the custom-metrics-stackdriver-adapter to be installed
# and configured to map k8s_container metrics to k8s_pod.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: triton-l4-gpu-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: triton-torchrec-l4
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Pods
    pods:
      metric:
        name: kubernetes.io|container|accelerator|duty_cycle
      target:
        type: AverageValue
        averageValue: 60 # Target 60% GPU kernel saturation
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: triton-g4-gpu-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: triton-torchrec-g4
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Pods
    pods:
      metric:
        name: kubernetes.io|container|accelerator|duty_cycle
      target:
        type: AverageValue
        averageValue: 60
