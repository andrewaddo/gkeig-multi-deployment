apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: triton-final-route
spec:
  parentRefs:
  - name: triton-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: triton-l4-svc
      port: 8000
    - name: triton-g4-svc
      port: 8000
